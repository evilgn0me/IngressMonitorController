name: Push

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'
      - 'docs/'
      - 'examples/'
      - 'hack/'
      - 'config/'

env:
  REGISTRY: ghcr.io
  DOCKER_REPOSITORY: ghcr.io/evilgn0me/ingressmonitorcontroller

jobs:
  lint:
    name: Lint
    if: "! contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.64
        only-new-issues: false
        args: --timeout 10m

  build:
    name: Build
    if: "! contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.generate_tag.outputs.new_tag }}
    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate Tag
      id: generate_tag
      uses: anothrNick/github-tag-action@1.61.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WITH_V: true
        DEFAULT_BUMP: patch
        DRY_RUN: true

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build image (populate cache)
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        push: false
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64

  publish:
    name: Publish
    needs: [lint, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Push image to GHCR
      uses: docker/build-push-action@v6
      with:
        context: .
        file: Dockerfile
        push: true
        cache-from: type=gha
        platforms: linux/amd64,linux/arm64
        tags: |
          ${{ env.DOCKER_REPOSITORY }}:${{ needs.build.outputs.image_tag }}
          ${{ env.DOCKER_REPOSITORY }}:latest
        labels: |
          org.opencontainers.image.source=${{ github.event.repository.clone_url }}
          org.opencontainers.image.revision=${{ github.sha }}

    - name: Push Tag
      uses: anothrNick/github-tag-action@1.61.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WITH_V: true
        DEFAULT_BUMP: patch

  update-helm-chart:
    name: Update Helm Chart
    needs: [publish, build]
    runs-on: ubuntu-latest
    steps:
    - name: Check out helm-charts repo
      uses: actions/checkout@v4
      with:
        repository: evilgn0me/helm-charts
        token: ${{ secrets.HELM_CHARTS_TOKEN }}

    - name: Bump chart version and image tag
      run: |
        TAG=${{ needs.build.outputs.image_tag }}
        VERSION=${TAG#v}
        sed -i "s/^version:.*/version: ${VERSION}/" charts/ingressmonitorcontroller/Chart.yaml
        sed -i "s/^appVersion:.*/appVersion: ${VERSION}/" charts/ingressmonitorcontroller/Chart.yaml
        sed -i "s/^\([[:space:]]*tag:\).*/\1 ${TAG}/" charts/ingressmonitorcontroller/values.yaml

    - name: Commit and push
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add charts/ingressmonitorcontroller/Chart.yaml charts/ingressmonitorcontroller/values.yaml
        git diff --staged --quiet || git commit -m "chore: bump ingressmonitorcontroller to ${{ needs.build.outputs.image_tag }}"
        git push
