name: Push

on:
  push:
    branches:
      - master
    paths-ignore:
      - '*.md'
      - 'docs/'
      - 'examples/'
      - 'hack/'
      - 'config/'

env:
  DOCKER_FILE_PATH: Dockerfile
  BUNDLE_DOCKER_FILE_PATH: bundle.Dockerfile
  OPERATOR_SDK_VERSION: "1.39.2"
  KUSTOMIZE_VERSION: "5.4.3"
  KUBERNETES_VERSION: "1.23.5"
  KIND_VERSION: "v0.17.0"
  HELM_VERSION: v3.8.2
  REGISTRY: ghcr.io
  DOCKER_REPOSITORY: ghcr.io/evilgn0me/ingressmonitorcontroller
  HELM_REGISTRY_URL: "https://evilgn0me.github.io/helm-charts"

jobs:
  build:
    name: Build
    if: "! contains(toJSON(github.event.commits.*.message), '[skip-ci]')"
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v4
      with:
        persist-credentials: false # otherwise, the token used is the GITHUB_TOKEN, instead of your personal token
        fetch-depth: 0 # otherwise, you will fail to push refs to dest repo

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: v1.64
        only-new-issues: false
        args: --timeout 10m

    # Set up helm binary
    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: ${{ env.HELM_VERSION }}

    - name: Helm Lint
      run: |
        helm lint charts/ingressmonitorcontroller

    - name: Install kind
      uses: engineerd/setup-kind@v0.5.0
      with:
        version:  ${{ env.KIND_VERSION }}

    - name: Check cluster info
      run: |
        kubectl version --client
        kind version
        kind version | grep -q ${KIND_VERSION}

    - name: Set up Cluster
      run: |
        kubectl cluster-info
        make install
        mkdir -p .local
        echo "${{ secrets.IMC_GITHUB_PIPELINE_CONFIG_ENCODED }}" | base64 --decode > .local/test-config.yaml

    - name: Test
      run: make test

    - name: Generate Tag
      id: generate_tag
      uses: anothrNick/github-tag-action@1.61.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WITH_V: true
        DEFAULT_BUMP: patch
        DRY_RUN: true

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        buildkitd-flags: --debug

    - name: Login to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push image to GHCR
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ env.DOCKER_FILE_PATH  }}
        pull: true
        push: true
        build-args: BUILD_PARAMETERS=${{ env.BUILD_PARAMETERS }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm,linux/arm64
        tags: |
          ${{ env.DOCKER_REPOSITORY }}:${{ steps.generate_tag.outputs.new_tag }}
          ${{ env.DOCKER_REPOSITORY }}:latest
        labels: |
          org.opencontainers.image.source=${{ github.event.repository.clone_url }}
          org.opencontainers.image.created=${{ steps.prep.outputs.created }}
          org.opencontainers.image.revision=${{ github.sha }}

    ##############################
    ## Add steps to generate required artifacts for a release here(helm chart, operator manifest etc.)
    ##############################

    # Generate tag for operator without "v"
    - name: Generate Operator Tag
      id: generate_operator_tag
      uses: anothrNick/github-tag-action@1.61.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WITH_V: false
        DEFAULT_BUMP: patch
        DRY_RUN: true

    # Install operator-sdk
    - name: Install operator-sdk
      uses: redhat-actions/openshift-tools-installer@v1
      with:
        source: "github"
        operator-sdk: ${{ env.OPERATOR_SDK_VERSION }}

    # Install kustomize
    - name: Install kustomize
      uses: imranismail/setup-kustomize@v2
      with:
        kustomize-version: ${{ env.KUSTOMIZE_VERSION }}

    - name: Generate Bundle
      env:
        VERSION: ${{ steps.generate_operator_tag.outputs.new_tag }}
        IMG: ${{ env.DOCKER_REPOSITORY }}:${{ steps.generate_tag.outputs.new_tag }}
      run: make bundle

    - name: Verify bundle
      run: operator-sdk bundle validate ./bundle --select-optional name=operatorhub

    - name: Build and push Bundle Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ${{ env.BUNDLE_DOCKER_FILE_PATH  }}
        pull: true
        push: true
        cache-to: type=inline
        tags: |
          ${{ env.DOCKER_REPOSITORY }}-bundle:${{ steps.generate_tag.outputs.new_tag }}
        labels: |
          org.opencontainers.image.source=${{ github.event.repository.clone_url }}
          org.opencontainers.image.created=${{ steps.prep.outputs.created }}
          org.opencontainers.image.revision=${{ github.sha }}

    # Update chart tag to the latest semver tag
    - name: Update Chart Version
      env:
        VERSION: ${{ steps.generate_operator_tag.outputs.new_tag }}
      run: make bump-chart

    - name: Update Chart CRDs
      run: make generate-crds

    # Publish helm chart
    - name: Publish Helm chart
      uses: stefanprodan/helm-gh-pages@master
      with:
        branch: gh-pages
        repository: helm-charts
        target_dir: charts
        token: ${{ secrets.GITHUB_TOKEN }}
        charts_dir: charts/
        charts_url: ${{ env.HELM_REGISTRY_URL }}
        owner: evilgn0me
        linting: on
        commit_username: ${{ github.actor }}
        commit_email: 7932965+evilgn0me@users.noreply.github.com

    # Commit back changes
    - name: Commit files
      run: |
        git config --local user.email "7932965+evilgn0me@users.noreply.github.com"
        git config --local user.name "github-actions"
        git status
        git add .
        git commit -m "[skip-ci] Update artifacts" -a

    - name: Push changes
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}

    # Push Latest Tag
    - name: Push Latest Tag
      uses: anothrNick/github-tag-action@1.61.0
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        WITH_V: true
        DEFAULT_BUMP: patch
